name: Build

on:
  push:
    branches:
      - main
    paths:
      - src/**
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - run: npm ci
      - name: Install CraftOS-PC 2
        run: |
          sudo add-apt-repository ppa:jackmacwindows/ppa
          sudo apt update
          sudo apt install craftos-pc

      - run: npm run test
      - run: npm run build

      - uses: suzuki-shunsuke/commit-action@f12e2d628a4ab72dcefe7890ae07e8dbf1e201b9 # v0.1.1
        with:
          commit_message: |
            ci: Update dist
          files: |
            dist
          fail_on_self_push: false
          app_id: ${{secrets.APP_ID}}
          app_private_key: ${{secrets.APP_PRIVATE_KEY}}
